<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="U1927 的个人主页，记录学习、兴趣与生活。" />
    <meta name="theme-color" content="#f4f1eb" />
    <meta property="og:title" content="U1927 - Personal Homepage" />
    <meta property="og:description" content="在 USTC 学习，保持好奇，也认真生活。" />
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/64768873?v=4" />
    <title>U1927 - Personal Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主要内容</a>

    <header class="site-header" data-header>
      <a class="wordmark" href="#top" aria-label="返回顶部">
        <span class="wordmark-mark">U</span>
        <span data-site-name>U1927</span>
      </a>
      <nav class="desktop-nav" aria-label="主导航">
        <a href="#about">关于</a>
        <a href="#contact">联系</a>
      </nav>
      <div class="header-actions">
        <a class="icon-button" data-github-link href="https://github.com/U1927" aria-label="GitHub" title="GitHub">
          <i data-lucide="github"></i>
        </a>
        <button class="icon-button" type="button" data-theme-toggle aria-label="切换深浅主题" title="切换主题">
          <i data-lucide="moon" data-theme-icon></i>
        </button>
      </div>
    </header>

    <main id="main">
      <section class="hero" id="top" aria-labelledby="hero-title">
        <div class="hero-grid"></div>
        <div class="hero-orbit" aria-hidden="true"></div>
        <div class="hero-content">
          <p class="eyebrow"><span class="status-dot"></span><span data-status></span></p>
          <h1 id="hero-title"><span data-hero-line-1></span><br /><em data-hero-line-2></em></h1>
          <p class="hero-intro" data-intro></p>
          <div class="hero-actions">
            <a class="button button-primary" href="#about">了解我 <i data-lucide="arrow-down-right"></i></a>
            <a class="text-link" data-github-link href="https://github.com/U1927">GitHub <i data-lucide="arrow-up-right"></i></a>
          </div>
        </div>
        <figure class="identity-figure">
          <div class="avatar-frame">
            <img data-avatar src="https://avatars.githubusercontent.com/u/64768873?v=4" alt="U1927 的 GitHub 头像" width="320" height="320" />
          </div>
          <figcaption>
            <span data-name></span>
            <span data-role></span>
          </figcaption>
        </figure>
        <p class="hero-index" aria-hidden="true">01 / INTRO</p>
      </section>

      <section class="manifesto section-pad" id="about" aria-labelledby="about-title">
        <div class="section-label"><span>02</span> 关于</div>
        <div class="manifesto-body">
          <h2 id="about-title" data-about-title></h2>
          <div class="about-copy" data-about-copy></div>
          <ul class="principles" data-principles aria-label="工作原则"></ul>
        </div>
      </section>

      <section class="contact section-pad" id="contact" aria-labelledby="contact-title">
        <div class="section-label light"><span>03</span> 联系</div>
        <div class="contact-copy">
          <p>如果你也对这些事情感兴趣，欢迎来聊聊。</p>
          <h2 id="contact-title">保持联系，<br /><em>认识彼此。</em></h2>
        </div>
        <a class="contact-link" data-github-link href="https://github.com/U1927">
          <span>通过 GitHub 联系我</span>
          <i data-lucide="arrow-up-right"></i>
        </a>
      </section>
    </main>

    <footer class="site-footer">
      <p><span data-site-name>U1927</span> &copy; <span data-year></span></p>
      <p>保持好奇，持续构建。</p>
      <a href="#top">回到顶部 <i data-lucide="arrow-up"></i></a>
    </footer>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="site-content.js"></script>
    <script src="app.js"></script>
  </body>
</html>
